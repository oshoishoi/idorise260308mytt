      if (!timeStr) return { start: 0, end: 0 };

        const [h, m] = hm.split(':').map(Number);
        return h * 60 + m;
      };

    const stageBorderColorsMap = {
      "Spotify O-EAST": "border-red-500", "Spotify O-WEST": "border-orange-500",
      "duo MUSIC EXCHANGE": "border-green-500", "WOMB": "border-pink-500",
      "clubasia": "border-blue-500", "SHIBUYA RING": "border-teal-500",
      "Spotify O-Crest": "border-sky-400", "Spotify O-nest": "border-purple-500"
    };

    const TimetableCard = React.memo(({ item, selections, songMemo, onSongChange, onRemove, isGenerating }) => {
      const isRecommended = selections[item.id] === 'recommended';
      const borderColor = stageBorderColorsMap[item.stage] || 'border-gray-800';
      const badgeColor = stageColorsMap[item.stage] || 'bg-gray-800 text-white';

      const getDynamicFontSize = (name) => {
          if (!isGenerating) return {};
          if (name.length > 15) return { fontSize: '13px' };
          if (name.length > 10) return { fontSize: '15px' };
          return { fontSize: '18px' };
      };

      return (
        <div className="item-wrapper relative flex flex-col w-full h-full">
          <div className={`card-inner rounded-xl flex flex-row relative border border-gray-200 shadow-sm overflow-hidden min-h-[60px] transition-all flex-1
            ${isRecommended ? 'bg-gradient-to-br from-white via-white to-orange-50/50' : 'bg-white'}`}>

            {isRecommended && !isGenerating && (
              <div className="rec-sidebar w-5 sm:w-6 bg-gradient-to-b from-orange-100 via-yellow-200 to-white flex flex-col items-center justify-start py-1.5 shrink-0 border-r border-orange-200/50">
                 <div className="w-3.5 h-3.5 bg-white/90 rounded-full flex items-center justify-center mb-1 shadow-sm"><Star size={9} className="fill-orange-400 text-orange-400" /></div>
                 <div className="writing-vertical flex items-center justify-center font-handwritten">
                   <span className="export-text-lift text-[8px] sm:text-[9.5px] font-black text-orange-600 tracking-tighter force-text-center">おすすめ</span>
                 </div>
              </div>
            )}

            <div className={`image-card-body flex-1 p-1.5 sm:p-2 flex flex-row items-center border-l-4 ${borderColor} min-w-0 h-full relative`}>
               <div className={`left-col-meta flex flex-col items-center shrink-0 ${isGenerating ? 'w-[60px]' : 'w-[70px] sm:w-[90px]'} mr-1.5 sm:mr-2`}>
                  <div className="px-1 py-0.5 rounded bg-gray-100/80 mb-0.5 w-full text-center time-container">
                    <span className="export-text-lift font-mono font-bold text-[8.5px] sm:text-[10px] leading-none text-gray-700 whitespace-nowrap">{item.time}</span>
                  </div>
                  <div className={`px-1 py-0.5 rounded-full w-full text-center ${badgeColor} stage-badge overflow-hidden`}>
                    <span className="export-text-lift text-[7px] sm:text-[8px] font-bold whitespace-nowrap overflow-hidden leading-none truncate-stage">
                      {item.stage.replace('Spotify ', '')}
                    </span>
                  </div>
               </div>

               <div className="center-col-name flex-1 flex flex-col justify-center min-w-0 px-1 overflow-hidden">
                  <div 
                    className={`font-bold export-text-lift two-col-group-name text-gray-900 text-left w-full ${isRecommended ? 'font-black' : ''}`}
                    style={{ 
                      ...getDynamicFontSize(item.name), 
                      lineHeight: '1.2',
                      textAlign: 'center',
                      display: 'flex',
                      alignItems: 'center',
                      justifyContent: 'center',
                      flex: 1
                    }}
                  >
                    {item.name}
                  </div>
                  {isRecommended && (
                    <div className="song-info-container flex items-center gap-1 mt-0.5 overflow-hidden justify-center">
                       <Music size={isGenerating ? 7 : 8} className="text-orange-300 shrink-0 song-decoration-icon" />
                       {!isGenerating ? (
                         <input 
                           type="text" 
                           placeholder="曲名" 
                           value={songMemo} 
                           onChange={(e) => onSongChange(item.id, e.target.value)} 
                           className="song-input-field text-[8.5px] font-bold bg-transparent w-full focus:outline-none placeholder-orange-100 text-orange-900 leading-none" 
                         />
                       ) : (
                         <span className="text-[10px] font-bold text-orange-700 truncate leading-none song-memo-text-node">{songMemo}</span>
                       )}
                    </div>
                  )}
               </div>
               
               {isGenerating && isRecommended && (
                 <div className="absolute top-1 right-1 text-orange-500">
                   <Star size={8} className="fill-orange-500" />
                 </div>
               )}

               {!isGenerating && <button onClick={() => onRemove(item.id)} className="shrink-0 p-1 text-gray-300 hover:text-red-500 transition-colors ml-1" aria-label="削除"><span className="text-[12px] font-bold">×</span></button>}
            </div>
          </div>
        </div>
      );
    });

    const AllStageTimetable = ({ processedSchedule, selections, toggleSelection, recommendedCount, busyRanges, MIN_TIME }) => {
      const stages = useMemo(() => Array.from(new Set(processedSchedule.map(item => item.stage))), [processedSchedule]);
      const stageLightColors = { "Spotify O-EAST": "bg-red-500/10", "Spotify O-WEST": "bg-orange-500/10", "duo MUSIC EXCHANGE": "bg-green-500/10", "WOMB": "bg-pink-500/10", "clubasia": "bg-blue-500/10", "SHIBUYA RING": "bg-teal-500/10", "Spotify O-Crest": "bg-sky-400/10", "Spotify O-nest": "bg-purple-500/10" };

      return (
        <div className="flex flex-col h-full overflow-hidden">
          <div className="px-4 py-1 flex-none bg-white/80 backdrop-blur-sm z-20 border-b border-gray-100">
            <div className="flex items-center justify-between">
              <div className="flex flex-col">
                <span className="text-rose-600 font-black text-[10px] leading-none mb-0.5">Day2: 3/8(日)</span>
                <p className="text-gray-500 text-[9px] m-0 font-bold tracking-tight">タップで選択 / 通常→おすすめ切替</p>
              </div>
              <div className="inline-flex items-center px-2 py-0.5 bg-yellow-100 border border-yellow-200 rounded shrink-0">
                <Star size={10} className="fill-yellow-500 text-yellow-500 mr-1" /><span className="text-[10px] font-bold text-yellow-800 leading-none">おすすめ {recommendedCount}/5</span>
              </div>
            </div>
          </div>
          <div className="flex-1 overflow-x-auto scrollbar-visible mt-1 px-4 relative">
            <div className="flex flex-row gap-3 min-w-max h-full overflow-y-auto pb-32 hide-scrollbar relative">
              <div className="absolute top-0 left-0 w-full pointer-events-none z-0">
                {busyRanges.map((range, i) => (
                  <div key={i} className={`absolute w-full border-y border-black/5 ${stageLightColors[range.stage] || 'bg-indigo-500/10'}`} style={{ top: `${STICKY_HEADER_HEIGHT + 6 + (range.start - MIN_TIME) * PIXELS_PER_MINUTE}px`, height: `${(range.end - range.start) * PIXELS_PER_MINUTE}px` }} />
                ))}
              </div>
              {stages.map(stage => {
                const stageItems = processedSchedule.filter(item => item.stage === stage).sort((a,b) => a.parsedTime.start - b.parsedTime.start);
                if (stageItems.length === 0) return null;
                let lastEnd = MIN_TIME;
                return (
                  <div key={stage} className="w-[80vw] sm:w-[280px] flex-shrink-0 flex flex-col bg-white/40 rounded-xl shadow-sm border border-gray-100 h-fit min-h-full z-10 text-ellipsis">
                    <div className={`px-3 py-1 font-bold flex items-center gap-1.5 sticky top-0 z-30 text-xs rounded-t-xl ${stageColorsMap[stage] || 'bg-gray-800 text-white'}`} style={{ height: `${STICKY_HEADER_HEIGHT}px` }}><MapPin size={14} /><span className="truncate">{stage}</span></div>
                    <div className="p-1.5 flex-1 relative bg-transparent">
                      {stageItems.map(item => {
                        const gap = item.parsedTime.start - lastEnd; lastEnd = item.parsedTime.end;
                        const isSel = selections[item.id];
                        return (
                          <React.Fragment key={item.id}>
                            {gap > 0 && <div style={{ height: `${gap * PIXELS_PER_MINUTE}px` }} />}
                            <button onClick={() => toggleSelection(item.id)} style={{ height: `${(item.parsedTime.end - item.parsedTime.start) * PIXELS_PER_MINUTE}px` }} className={`w-full text-left px-1.5 py-0 rounded-md flex items-center justify-between border overflow-hidden ${isSel ? `${stageColorsMap[stage]} shadow-md border-transparent` : 'bg-white border-gray-200 hover:border-gray-300'}`}>
                              <div className="flex flex-col justify-center h-full w-full pr-1 overflow-hidden whitespace-nowrap text-ellipsis">
                                <span className={`text-[9px] font-mono whitespace-nowrap leading-none mb-0.5 ${isSel ? 'text-white/80' : 'text-gray-500'}`}>{item.time}</span>
                                <span className={`font-bold text-[13px] sm:text-[15px] leading-tight text-left truncate ${isSel ? 'text-white' : 'text-gray-900'}`}>{item.name}</span>
                              </div>
                              <div className="flex-shrink-0">{selections[item.id] === 'recommended' ? <Star className="text-yellow-300 fill-yellow-300" size={14} /> : (isSel ? <CheckCircle2 className="text-white" size={14} /> : <Circle className="text-gray-300" size={14} />)}</div>
                            </button>
                          </React.Fragment>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('all');
      const [selections, setSelections] = useState({}); 
      const [songMemos, setSongMemos] = useState({}); 
      const [gapMemos, setGapMemos] = useState({}); 
      const [userName, setUserName] = useState('');
      const [isGenerating, setIsGenerating] = useState(false);

      const processedSchedule = useMemo(() => scheduleData.map(item => ({ ...item, parsedTime: parseTime(item.time) })), []);
      const MIN_TIME = useMemo(() => Math.min(...processedSchedule.map(item => item.parsedTime.start)), [processedSchedule]);
      const mySchedule = useMemo(() => processedSchedule.filter(s => selections[s.id]).sort((a, b) => a.parsedTime.start - b.parsedTime.start), [processedSchedule, selections]);
      const recommendedCount = useMemo(() => Object.values(selections).filter(v => v === 'recommended').length, [selections]);

      const busyRanges = useMemo(() => {
        return Object.keys(selections).map(id => {
            const item = processedSchedule.find(p => p.id === parseInt(id));
            return item ? { ...item.parsedTime, stage: item.stage } : null;
        }).filter(Boolean);
      }, [selections, processedSchedule]);

      const toggleSelection = useCallback((id) => {
        setSelections(prev => {
          const next = { ...prev };
          if (!prev[id]) next[id] = 'normal';
          else if (prev[id] === 'normal') {
            if (Object.values(prev).filter(v => v === 'recommended').length >= 5) {
              delete next[id];
            } else next[id] = 'recommended';
          } else delete next[id];
          return next;
        });
      }, []);

      const onRemove = useCallback((id) => setSelections(prev => { const n = {...prev}; delete n[id]; return n; }), []);
      const onSongChange = useCallback((id, val) => setSongMemos(prev => ({ ...prev, [id]: val })), []);
      const onGapMemoChange = useCallback((id, val) => setGapMemos(prev => ({ ...prev, [id]: val })), []); 
      
      const handleTabChange = useCallback((tab) => { setActiveTab(tab); }, []);

      const getScheduleWithGaps = useCallback(() => {
          const elements = [];
          mySchedule.forEach((item, i) => {
              elements.push({ type: 'card', data: item });
              const next = mySchedule[i+1];
              if (next && (next.parsedTime.start - item.parsedTime.end) >= 15) {
                  const minutes = next.parsedTime.start - item.parsedTime.end;
                  elements.push({ 
                      type: 'gap', 
                      id: `gap-${item.id}-${next.id}`, 
                      minutes: minutes 
                  });
              }
          });
          return elements;
      }, [mySchedule]);

      const handleDownload = async () => {
        setIsGenerating(true);
        await new Promise(r => setTimeout(r, 500));
        
        try {
          const sourceElement = document.getElementById('my-schedule-content');
          if (!sourceElement) return;

          const exportWidth = 720; 
          const exportHeight = 960; 
          const headerHeight = 100; 
          const marginVal = 13.33; 
          const gapBetweenItems = 2; 
          
          const availableBodyHeight = exportHeight - headerHeight - (marginVal * 2);
          const rowHeight = (availableBodyHeight - (9 * gapBetweenItems)) / 10; 

          const wrapper = document.createElement('div');
          wrapper.style.width = `${exportWidth}px`;
          wrapper.style.height = `${exportHeight}px`;
          wrapper.className = 'is-exporting'; 
          wrapper.style.backgroundColor = '#f9fafb';
          wrapper.style.position = 'fixed';
          wrapper.style.left = '-9999px';
          wrapper.style.top = '0';
          wrapper.style.display = 'flex';
          wrapper.style.flexDirection = 'column';
          wrapper.style.overflow = 'hidden';

          const elements = getScheduleWithGaps();
          const clone = sourceElement.cloneNode(true);
          clone.style.width = '100%';
          clone.style.height = '100%';
          clone.style.paddingTop = '0px';

          const clonedAllCards = Array.from(clone.querySelectorAll('.item-wrapper, .gap-wrapper'));

          const headerArea = clone.querySelector('.header-content-area');
          if (headerArea) {
            headerArea.style.height = `${headerHeight}px`;
            headerArea.style.minHeight = `${headerHeight}px`;
            headerArea.style.backgroundColor = 'transparent';
            headerArea.style.border = 'none';
            
            headerArea.innerHTML = `
              <div class="w-full flex flex-col items-center justify-center h-full bg-transparent">
                <div class="flex items-center gap-4 mb-1">
                  <span class="text-[28px] font-black text-rose-900 tracking-tighter">IDORISE!! FESTIVAL 2026</span>
                  <span class="text-rose-600 font-black text-[14px] leading-none">Day2: 3/8(日)</span>
                </div>
                <div class="flex items-center gap-1">
                   <span class="text-[22px] font-black text-gray-900">${userName || '名前'}</span>
                   <span class="text-[18px] font-bold text-gray-500">のタイテ</span>
                </div>
              </div>
            `;
          }

          const timelineContainer = clone.querySelector('.timeline-outer-container');
          if (timelineContainer) {
            timelineContainer.style.flex = '1';
            timelineContainer.style.display = 'flex';
            timelineContainer.style.flexDirection = 'row'; 
            timelineContainer.style.gap = '10px';
            timelineContainer.style.padding = `${marginVal}px 10px`;
            timelineContainer.innerHTML = ''; 

            const columnsData = elements.length > 10 ? [elements.slice(0, 10), elements.slice(10)] : [elements];

            columnsData.forEach((colItems, colIdx) => {
               const col = document.createElement('div');
               col.style.flex = '1';
               col.style.display = 'flex';
               col.style.flexDirection = 'column';
               col.style.gap = `${gapBetweenItems}px`; 
               col.style.height = '100%';

               colItems.forEach((el, elIdxInCol) => {
                  const elWrapper = document.createElement('div');
                  elWrapper.style.height = `${rowHeight}px`; 
                  elWrapper.style.display = 'flex';
                  elWrapper.style.flexDirection = 'column';

                  const globalIdx = (colIdx * 10) + elIdxInCol;
                  const itemClone = clonedAllCards[globalIdx];

                  if (el.type === 'card' && itemClone) {
                      const isRec = selections[el.data.id] === 'recommended';
                      itemClone.style.height = '100%';
                      itemClone.style.flex = '1';
                      const inner = itemClone.querySelector('.card-inner');
                      if(inner) {
                          inner.style.height = '100%';
                          inner.style.border = '1px solid #e5e7eb';
                          inner.style.position = 'relative';
                          if (isRec) {
                            inner.style.background = 'linear-gradient(135deg, #fff7ed 0%, #ffffff 100%)';
                            const recText = document.createElement('div');
                            recText.textContent = 'おすすめ';
                            recText.style.position = 'absolute';
                            recText.style.right = '4px'; recText.style.top = '0'; recText.style.bottom = '0';
                            recText.style.display = 'flex'; recText.style.alignItems = 'center';
                            recText.style.writingMode = 'vertical-rl';
                            recText.style.fontSize = '8px'; recText.style.fontWeight = '900';
                            recText.style.color = '#f97316'; recText.style.letterSpacing = '1px';
                            recText.style.transform = 'translateY(6px)';
                            inner.appendChild(recText);
                          } else { inner.style.background = '#ffffff'; }
                      }
                      const body = itemClone.querySelector('.image-card-body');
                      if(body) {
                        body.style.padding = '2px 6px'; body.style.height = '100%';
                        body.style.borderLeft = `4px solid ${stageHexColorsMap[el.data.stage] || '#000'}`;
                        body.style.display = 'flex'; body.style.alignItems = 'center';
                      }
                      const leftCol = body?.querySelector('.left-col-meta');
                      if(leftCol) {
                          leftCol.style.width = '60px'; leftCol.style.marginRight = '4px';
                          leftCol.style.transform = 'translateY(-8px)';
                          const timeDiv = leftCol.querySelector('.time-container');
                          if(timeDiv) { timeDiv.style.backgroundColor = 'transparent'; timeDiv.style.padding = '0'; timeDiv.style.marginBottom = '0'; }
                          const stBadge = leftCol.querySelector('.stage-badge');
                          if(stBadge) {
                              stBadge.style.backgroundColor = 'transparent'; stBadge.style.borderRadius = '0';
                              stBadge.style.padding = '0'; stBadge.style.textAlign = 'center';
                              stBadge.style.color = stageHexColorsMap[el.data.stage] || '#000000';
                              const span = stBadge.querySelector('span');
                              if(span) {
                                  span.textContent = el.data.stage.replace('Spotify O-', '').replace('Spotify ', '');
                                  span.style.fontWeight = '900'; span.style.fontSize = '11.5px';
                                  span.style.lineHeight = '1.5'; span.style.display = 'block';
                                  span.style.paddingBottom = '2px'; span.style.overflow = 'visible'; 
                              }
                          }
                      }
                      const centerCol = body?.querySelector('.center-col-name');
                      if(centerCol) {
                          centerCol.style.alignItems = 'center'; centerCol.style.justifyContent = 'center';
                          centerCol.style.textAlign = 'center'; centerCol.style.flex = '1';
                          centerCol.style.overflow = 'visible'; 
                          centerCol.style.transform = isRec ? 'translateY(2px)' : 'translateY(-2px)';
                          const nameTxt = centerCol.querySelector('.two-col-group-name');
                          if(nameTxt) {
                              const len = el.data.name.length;
                              nameTxt.style.fontSize = len > 15 ? '13px' : len > 10 ? '15px' : '18px';
                              nameTxt.style.fontWeight = '900'; nameTxt.style.lineHeight = '1.2';
                              nameTxt.style.textAlign = 'center'; nameTxt.style.whiteSpace = 'normal';
                          }
                          const songCont = centerCol.querySelector('.song-info-container');
                          if(songCont) {
                            songCont.style.marginTop = '4px'; songCont.style.justifyContent = 'center';
                            songCont.style.alignItems = 'center'; songCont.style.display = 'flex';
                            const icon = songCont.querySelector('.song-decoration-icon');
                            if(icon) icon.style.transform = 'translateY(2px)';
                            const memoSpan = songCont.querySelector('.song-memo-text-node');
                            if (memoSpan) {
                                memoSpan.style.fontSize = '10px'; memoSpan.style.lineHeight = '1.5'; 
                                memoSpan.style.display = 'inline-block'; memoSpan.style.paddingBottom = '4px'; 
                                memoSpan.textContent = songMemos[el.data.id] || "";
                            }
                          }
                      }
                      itemClone.querySelector('button[aria-label="削除"]')?.remove();
                      itemClone.querySelector('.absolute.top-1.right-1')?.remove();
                      itemClone.querySelector('.rec-sidebar')?.remove();
                      elWrapper.appendChild(itemClone);
                  } else if (el.type === 'gap' && itemClone) {
                      itemClone.style.height = '100%';
                      itemClone.style.flex = '1';
                      const inner = itemClone.querySelector('.card-inner-gap');
                      if (inner) {
                          inner.style.height = '100%';
                          inner.style.display = 'flex';
                          inner.style.flexDirection = 'column';
                          inner.style.alignItems = 'center';
                          inner.style.justifyContent = 'center';
                          inner.style.backgroundColor = '#f3f4f6';
                          inner.style.borderRadius = '8px';
                          const memoArea = inner.querySelector('.gap-memo-display');
                          if(memoArea) {
                              memoArea.style.fontSize = '11px';
                              memoArea.style.fontWeight = '900';
                              memoArea.style.color = '#4b5563';
                              memoArea.textContent = gapMemos[el.id] || "";
                          }
                          inner.querySelector('input')?.remove();
                      }
                      elWrapper.appendChild(itemClone);
                  }
                  col.appendChild(elWrapper);
               });
               
               if(colItems.length < 10) {
                   for(let i=0; i < (10 - colItems.length); i++){
                       const pad = document.createElement('div');
                       pad.style.height = `${rowHeight}px`;
                       col.appendChild(pad);
                   }
               }
               timelineContainer.appendChild(col);
            });
          }

          wrapper.appendChild(clone);
          document.body.appendChild(wrapper);

          await new Promise(r => setTimeout(r, 200));

          const canvas = await html2canvas(wrapper, { 
            scale: 2, 
            useCORS: true, 
            backgroundColor: '#f9fafb', 
            width: exportWidth, 
            height: exportHeight, 
            logging: false 
          });
          document.body.removeChild(wrapper);
          const url = canvas.toDataURL('image/png');
          const a = document.createElement('a'); 
          a.href = url; 
          a.download = `idorise_2026_0308_mytable_v1_0.png`; 
          a.click();
        } catch (error) { console.error('画像生成エラー:', error); } finally { setIsGenerating(false); }
      };

      return (
        <div className="h-screen flex flex-col overflow-hidden text-gray-900 font-sans">
          <header className="bg-white px-4 py-2 shadow-sm z-50 flex-none border-b border-gray-100">
            <h1 className="flex flex-row items-center justify-center gap-2 text-rose-900 h-10">
              <span className="text-sm sm:text-base font-black tracking-tight whitespace-nowrap">IDORISE!! FESTIVAL 2026</span>
              <div className="px-1.5 py-0.5 text-[10px] font-bold text-rose-600 bg-rose-50 rounded border border-rose-100 whitespace-nowrap">Day2: 3/8(日)</div>
            </h1>
          </header>

          <main className="flex-1 overflow-hidden pb-16">
            {activeTab === 'all' ? (
              <AllStageTimetable processedSchedule={processedSchedule} selections={selections} toggleSelection={toggleSelection} recommendedCount={recommendedCount} busyRanges={busyRanges} MIN_TIME = {MIN_TIME} />
            ) : (
              <div className={`mx-auto pb-24 h-full overflow-y-auto w-full scrollbar-visible`}>
                <div className="flex flex-col sm:flex-row items-center justify-center p-2 mb-2 mt-2 mx-auto max-w-xl">
                  <button onClick={handleDownload} disabled={isGenerating} className="flex items-center justify-center gap-2 px-6 py-3 bg-rose-600 text-white text-sm font-bold rounded-xl hover:bg-rose-700 disabled:bg-rose-300 transition-colors shadow-lg w-full sm:w-auto active:scale-95">
                    {isGenerating ? <Loader2 size={18} className="animate-spin" /> : <Download size={18} />}{isGenerating ? '生成中...' : '画像を保存'}
                  </button>
                </div>
                <div id="my-schedule-content" className="bg-gray-50 flex flex-col w-full h-fit relative">
                  <div className="bg-white border-b border-gray-200 shrink-0 header-content-area overflow-hidden py-4 text-center">
                    <div className="flex flex-col items-center justify-center gap-2 w-full px-1">
                       <div className="flex items-center gap-1.5 shrink-0 h-6"><h2 className="text-[14px] sm:text-[16px] font-black text-rose-900 tracking-tight m-0 whitespace-nowrap export-text-lift">IDORISE!! FESTIVAL 2026</h2><div className="px-1.5 py-0 bg-rose-500 rounded-sm flex items-center justify-center h-4.5 translate-y-[1px] text-[9px] sm:text-[10px] font-bold text-white">Day2: 3/8(日)</div></div>
                       <div className="name-input-container border-b-2 border-rose-300 px-1 flex items-center h-7 min-w-[120px] justify-center font-sans font-bold"><input type="text" placeholder="名前を入力" value={userName} onChange={(e) => setUserName(e.target.value)} className="name-input-field text-[14px] font-bold text-center pr-0.5 text-gray-800 bg-transparent w-[80px] focus:outline-none placeholder-gray-300" maxLength="15" /><span className="text-[12px] font-bold text-gray-600 whitespace-nowrap flex items-center h-full"> のタイテ</span></div>
                    </div>
                  </div>
                  <div className="flex flex-col items-center py-4 px-2 timeline-outer-container">
                    <div className="flex flex-col gap-2 w-full max-w-xl mx-auto">
                      {getScheduleWithGaps().map((el) => {
                        if (el.type === 'card') {
                          return (
                            <TimetableCard 
                              key={el.data.id} item={el.data} selections={selections}
                              songMemo={songMemos[el.data.id] || ''}
                              onSongChange={onSongChange} onRemove={onRemove} isGenerating={isGenerating}
                            />
                          );
                        } else {
                          return (
                            <div key={el.id} className="gap-wrapper w-full h-full">
                                <div className="card-inner-gap bg-gray-100/80 border border-gray-200 rounded-xl p-2 flex flex-col items-center justify-center min-h-[50px]">
                                    <div className="flex items-center gap-1.5 gap-label mb-1">
                                        <Coffee size={14} className="text-gray-400" />
                                        <span className="text-[11px] font-bold text-gray-500">{el.minutes}分 空き</span>
                                    </div>
                                    {!isGenerating ? (
                                        <input 
                                            type="text" 
                                            placeholder="過ごし方を記入" 
                                            value={gapMemos[el.id] || ''}
                                            onChange={(e) => onGapMemoChange(el.id, e.target.value)}
                                            className="w-full bg-white/50 border border-gray-200 rounded px-2 py-1 text-[11px] font-bold text-center focus:outline-none focus:border-rose-300 placeholder-gray-300"
                                        />
                                    ) : (
                                        <span className="text-[11px] font-black text-gray-600 gap-memo-display">{gapMemos[el.id] || ''}</span>
                                    )}
                                </div>
                            </div>
                          );
                        }
                      })}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 pb-safe z-50">
            <div className="max-w-lg mx-auto flex h-16">
              <button onClick={() => handleTabChange('all')} className={`flex-1 py-3 flex flex-col items-center justify-center gap-0.5 transition-colors ${activeTab === 'all' ? 'text-rose-600' : 'text-gray-400 hover:text-gray-600'}`}><ListTodo size={18} /><span className="text-[10px] font-bold">全ステージ一覧</span></button>
              <button onClick={() => handleTabChange('mine')} className={`flex-1 py-3 flex flex-col items-center justify-center gap-0.5 transition-colors relative ${activeTab === 'mine' ? 'text-rose-600' : 'text-gray-400 hover:text-gray-600'}`}><div className="relative"><CalendarRange size={18} />{Object.keys(selections).length > 0 && <span className="absolute -top-1 -right-2 bg-red-500 text-white text-[9px] font-bold w-3.5 h-3.5 rounded-full flex items-center justify-center">{Object.keys(selections).length}</span>}</div><span className="text-[10px] font-bold">マイスケジュール</span></button>
            </div>
          </div>
        </div>
      );
    }

    const startApp = () => {
      const rootElement = document.getElementById('root');
      if (rootElement) {
        try {
          createRoot(rootElement).render(<App />);
        } catch (e) {
          console.error("React render error:", e);
        }
      }
    };

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startApp);
    } else {
      startApp();
    }
  </script>
</body>
</html>
